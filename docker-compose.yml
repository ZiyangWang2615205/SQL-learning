services:
  mysql:
    image: mysql:8.4
    container_name: mysql-learning
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: learning_db
      MYSQL_USER: student
      MYSQL_PASSWORD: student123
    ports:
      - "3307:3306"
    volumes:
      - mysql_learning_data:/var/lib/mysql

volumes:
  mysql_learning_data: